<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ラッカゴスペル 一人回しシミュレーター v9.0</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --zone-bg: #1e293b;
            --card-bg: #334155;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --border-color: #475569;
            --drag-over-color: #3b82f6;
        }

        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 10px; user-select: none; }
        h1 { text-align: center; font-size: 1.2rem; margin: 0; color: var(--accent); letter-spacing: 1px; }

        .status-bar { text-align: center; font-size: 0.9rem; font-weight: bold; margin: 5px 0 10px 0; color: #fbbf24; background: #000; padding: 5px; border-radius: 4px; border: 1px solid #333; }

        .controls { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        button { background-color: var(--accent); color: #fff; border: none; padding: 6px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        button:hover { filter: brightness(1.2); }
        button.turn-btn { background-color: #10b981; }
        button.reset { background-color: #ef4444; }

        .board { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 10px; margin-bottom: 10px; }
        
        .zone { background-color: var(--zone-bg); border: 2px solid var(--border-color); border-radius: 6px; padding: 8px; min-height: 120px; position: relative; transition: background-color 0.2s, border-color 0.2s; }
        .zone.drag-over { border-color: var(--drag-over-color); background-color: #1d4ed833; }
        
        .zone-title { font-size: 0.75rem; font-weight: bold; color: var(--text-muted); margin-bottom: 6px; border-bottom: 1px solid #444; padding-bottom: 3px; display: flex; justify-content: space-between; pointer-events: none; }

        .bottom-row { display: grid; grid-template-columns: 120px 1fr; gap: 10px; }
        .card-list { display: flex; flex-wrap: wrap; gap: 6px; min-height: 100px; }

        .card {
            background-color: #000;
            border: 1px solid #444;
            border-radius: 4px;
            width: 100px;
            height: 140px;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            cursor: grab;
            transition: transform 0.2s, border-color 0.2s;
            overflow: hidden;
            touch-action: none;
        }
        .card:active { cursor: grabbing; }
        .card:hover { border-color: var(--accent); z-index: 5; }

        .card-img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        .card.tapped { transform: rotate(90deg); border-color: #fbbf24; margin: 0 15px; }
        .card.dragging { opacity: 0.4; border-style: dashed; }

        .card.facedown { background: #450a0a; transform: none !important; }
        .card.facedown .card-img { display: none; }
        .card.facedown::before { content: 'デュエマ'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #991b1b; font-weight: bold; font-size: 1rem; letter-spacing: 1px; }

        .deck-count { font-size: 2.2rem; text-align: center; margin-top: 10px; font-weight: bold; color: var(--accent); }

        /* モーダル */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e293b; border: 2px solid var(--accent); border-radius: 8px; padding: 15px; z-index: 100; box-shadow: 0 0 30px rgba(0,0,0,0.8); width: 320px; text-align: center; max-height: 80vh; overflow-y: auto; }
        .modal-img { width: 60%; height: auto; border-radius: 4px; margin-bottom: 10px; border: 1px solid #555; }
        .modal-buttons { display: flex; flex-direction: column; gap: 6px; }
        .modal-buttons button { padding: 10px; font-size: 0.85rem; font-weight: bold; }
        .modal-close { background-color: #475569; color: white; margin-top: 8px; font-size: 0.7rem; padding: 5px; cursor: pointer; border: none; border-radius: 4px; width: 100%; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:90; }

        /* 特殊選択用リスト */
        .select-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 10px; }
        .select-item { border: 1px solid #444; border-radius: 4px; padding: 2px; cursor: pointer; background: #111; }
        .select-item img { width: 100%; height: auto; object-fit: cover; }
        .select-item:hover { border-color: var(--accent); }
    </style>
</head>
<body>

    <h1>ラッカゴスペル 一人回しシミュレーター</h1>
    <div class="status-bar" id="game-status">ターン 1 ｜ マナセット：未完了 ｜ 追加ターン：0</div>

    <div class="controls">
        <button class="reset" onclick="initGame()">最初からやり直す</button>
        <button class="turn-btn" onclick="nextTurn()">ターン終了 ➔ アンタップ＆ドロー</button>
        <button onclick="drawCard()">1マナドロー</button>
    </div>

    <div class="board">
        <div class="zone" id="shield" data-zone="shield">
            <div class="zone-title"><span>シールドゾーン</span><span id="count-shield">0</span></div>
            <div class="card-list" id="list-shield"></div>
        </div>
        <div class="zone" id="battle" data-zone="battle">
            <div class="zone-title"><span>バトルゾーン（クリックでタップ/アンタップ）</span><span id="count-battle">0</span></div>
            <div class="card-list" id="list-battle"></div>
        </div>
        <div class="zone" id="mana" data-zone="mana">
            <div class="zone-title"><span>マナゾーン</span><span id="count-mana">0</span></div>
            <div class="card-list" id="list-mana"></div>
        </div>
        <div class="zone" id="graveyard" data-zone="graveyard">
            <div class="zone-title"><span>墓地 (呪文カウント: <span id="spell-count" style="color:#ef4444">0</span>枚)</span><span id="count-graveyard">0</span></div>
            <div class="card-list" id="list-graveyard"></div>
        </div>
    </div>

    <div class="bottom-row">
        <div class="zone" id="deck-zone" onclick="drawCard()">
            <div class="zone-title"><span>山札</span></div>
            <div class="deck-count" id="count-deck">40</div>
            <div style="text-align: center; font-size: 0.6rem; color: var(--text-muted);">クリックでドロー</div>
        </div>
        <div class="zone" id="hand" data-zone="hand">
            <div class="zone-title"><span>手札 (クリックで唱える/使用する)</span><span id="count-hand">0</span></div>
            <div class="card-list" id="list-hand"></div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeModal()"></div>
    
    <div class="modal" id="effect-modal">
        <img id="modal-card-img" class="modal-img" src="" alt="card">
        <div id="modal-card-name" style="font-weight:bold; margin-bottom:10px; font-size:0.9rem;"></div>
        <div class="modal-buttons" id="modal-actions"></div>
        <button class="modal-close" onclick="closeModal()">キャンセル</button>
    </div>

    <div class="modal" id="action-modal" style="width: 340px;">
        <div id="action-modal-title" style="font-weight:bold; margin-bottom:10px;">カードを選択してください</div>
        <div class="select-grid" id="action-modal-grid"></div>
        <button class="modal-close" onclick="closeModal()">閉じる</button>
    </div>

    <script>
        const cardFileMap = {
            "gospel": "ゴスペル.jpg",
            "lyrmis": "ガリュミーズ.jpg",
            "love": "ラフルル.jpg",
            "ttt": "TTT.jpg",
            "kirimomi": "キリモミ.jpg",
            "gate": "ロスト.jpg",
            "coldflame": "コルフレ.jpg",
            "finger": "バニフィン.jpg",
            "roaring": "ウリドガルド.jpg",
            "concerto": "セイレーン.jpg",
            "maniacs": "マニアクス.jpg",
            "flame": "ドラハイ.jpg",
            "judge": "オリジャ.jpg",
            "sss": "SSS.jpg",
            "rrr": "RRR.jpg"
        };

        const masterCards = [
            { id: "gospel", name: "水晶の王 ゴスペル", color: "光/水", isSpell: false, count: 4, multi: true },
            { id: "lyrmis", name: "月下卍壊 ガ・リュミーズ卍", color: "水", isSpell: true, count: 2, multi: false },
            { id: "love", name: "音卿の精霊龍 ラフルル・ラブ", color: "光/水", isSpell: true, count: 1, multi: true },
            { id: "ttt", name: "T・T・T", color: "光/水/火", isSpell: true, count: 4, multi: true },
            { id: "kirimomi", name: "キリモミ・ヤマアラシ", color: "火", isSpell: true, count: 3, multi: false },
            { id: "gate", name: "ロスト・ウォーターゲイト", color: "水", isSpell: true, count: 3, multi: false },
            { id: "coldflame", name: "氷柱と炎弧の決断", color: "水/火", isSpell: true, count: 4, multi: true },
            { id: "finger", name: "バーニング・フィンガー", color: "火", isSpell: true, count: 3, multi: false },
            { id: "roaring", name: "虚ト成リシ古ノ蛇神ノ咆咆", color: "火", isSpell: true, count: 3, multi: false },
            { id: "concerto", name: "セイレーン・コンチェルト", color: "水", isSpell: true, count: 1, multi: false },
            { id: "maniacs", name: "バッドドッグ・マニアクス", color: "火", isSpell: true, count: 3, multi: false },
            { id: "flame", name: "最期の竜炎", color: "火", isSpell: true, count: 2, multi: false },
            { id: "judge", name: "オリオティス・ジャッジ", color: "光", isSpell: true, count: 2, multi: false },
            { id: "sss", name: "S・S・S", color: "光/水/火", isSpell: true, count: 3, multi: true },
            { id: "rrr", name: "R・R・R", color: "光/水/自然", isSpell: true, count: 2, multi: true }
        ];

        let state = { deck: [], hand: [], shield: [], mana: [], battle: [], graveyard: [], turn: 1, extraTurns: 0, hasChargedMana: false };
        let cardUid = 0;
        let draggedCardInfo = null;

        function initGame() {
            state = { deck: [], hand: [], shield: [], mana: [], battle: [], graveyard: [], turn: 1, extraTurns: 0, hasChargedMana: false };
            cardUid = 0;
            masterCards.forEach(mc => {
                for(let i=0; i<mc.count; i++) {
                    state.deck.push({...mc, uid: cardUid++, img: cardFileMap[mc.id], tapped: false, facedown: false});
                }
            });
            shuffle(state.deck);
            for(let i=0; i<5; i++) { let c = state.deck.pop(); c.facedown = true; state.shield.push(c); }
            for(let i=0; i<5; i++) state.hand.push(state.deck.pop());
            render();
        }

        function shuffle(a) { for(let i=a.length-1; i>0; i--){ let j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } }

        function drawCard() { if(state.deck.length>0){ state.hand.push(state.deck.pop()); render(); } else alert("山札がなくなりました！（アウト）"); }

        function nextTurn() {
            state.mana.forEach(c => c.tapped = false);
            state.battle.forEach(c => c.tapped = false);
            if(state.extraTurns > 0) { state.extraTurns--; alert("追加ターンを開始します！"); } else state.turn++;
            state.hasChargedMana = false;
            drawCard();
            render();
        }

        function moveCard(uid, from, to) {
            if (from === to) return;
            if (from === 'hand' && to === 'mana') { 
                if (state.hasChargedMana) { 
                    alert("マナチャージは1ターンに1回までだじょ！"); 
                    return; 
                } 
                state.hasChargedMana = true; 
            }
            let idx = state[from].findIndex(c => c.uid === uid);
            if (idx !== -1) {
                let c = state[from].splice(idx, 1)[0];
                c.facedown = (to === 'shield');
                if (to === 'mana' && c.multi) c.tapped = true; else if (to !== 'battle') c.tapped = false;
                state[to].push(c);
                
                // 直接墓地にドラッグされた場合は効果を発動するトリガーにする
                if (from === 'hand' && to === 'graveyard') {
                    resolveCardEffect(c, 'hand');
                } else if (to === 'battle' && c.id === 'gospel') {
                    executeGospel();
                }
                render();
            }
        }

        function setupDragAndDrop(element, uid, fromZone) {
            element.draggable = true;
            
            element.addEventListener('dragstart', (e) => {
                draggedCardInfo = { uid: uid, from: fromZone };
                element.classList.add('dragging');
                e.dataTransfer.setData('text/plain', uid);
            });

            element.addEventListener('dragend', () => {
                element.classList.remove('dragging');
            });

            let isPointerDragging = false;
            let startX, startY;

            element.addEventListener('pointerdown', (e) => {
                isPointerDragging = false;
                startX = e.clientX;
                startY = e.clientY;
                draggedCardInfo = { uid: uid, from: fromZone };
                element.setPointerCapture(e.pointerId);
            });

            element.addEventListener('pointermove', (e) => {
                if (draggedCardInfo && (Math.abs(e.clientX - startX) > 10 || Math.abs(e.clientY - startY) > 10)) {
                    if (!isPointerDragging) {
                        isPointerDragging = true;
                        element.classList.add('dragging');
                    }
                }
            });

            element.addEventListener('pointerup', (e) => {
                element.releasePointerCapture(e.pointerId);
                if (!isPointerDragging) {
                    if (fromZone === 'battle' || fromZone === 'mana') {
                        let c = state[fromZone].find(x => x.uid === uid);
                        if (c) { c.tapped = !c.tapped; render(); }
                    } else if (fromZone === 'shield') {
                        if (confirm("このシールドを手札に加えますか？")) moveCard(uid, fromZone, 'hand');
                    } else if (fromZone === 'hand') {
                        openModal(uid, fromZone);
                    }
                } else {
                    element.classList.remove('dragging');
                    let targetEl = document.elementFromPoint(e.clientX, e.clientY);
                    let zoneEl = targetEl ? targetEl.closest('.zone') : null;
                    if (zoneEl) {
                        let toZone = zoneEl.getAttribute('data-zone');
                        if (toZone) moveCard(draggedCardInfo.uid, draggedCardInfo.from, toZone);
                    }
                }
                isPointerDragging = false;
                draggedCardInfo = null;
            });
        }

        document.querySelectorAll('.zone').forEach(zone => {
            zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag-over'); });
            zone.addEventListener('dragleave', () => { zone.classList.remove('drag-over'); });
            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.classList.remove('drag-over');
                if (draggedCardInfo) {
                    let toZone = zone.getAttribute('data-zone');
                    if (toZone) moveCard(draggedCardInfo.uid, draggedCardInfo.from, toZone);
                    draggedCardInfo = null;
                }
            });
        });

        // 効果選択用ウィンドウの展開
        function openModal(uid, zone) {
            let c = state[zone].find(x => x.uid === uid);
            if(!c || c.facedown) return;
            
            document.getElementById('modal-card-img').src = c.img;
            document.getElementById('modal-card-name').innerText = c.name;
            document.getElementById('modal-card-img').onerror = function() {
                if(this.src.endsWith('.jpg')) this.src = this.src.replace('.jpg', '.JPG');
            };

            const acts = document.getElementById('modal-actions'); acts.innerHTML = '';
            
            if (c.isSpell || c.id === 'love') {
                createBtn(acts, "✨ 唱える（効果を自動処理して墓地へ）", () => {
                    moveCard(c.uid, zone, 'graveyard');
                });
            } else {
                createBtn(acts, "⚔️ バトルゾーンに出す", () => {
                    moveCard(c.uid, zone, 'battle');
                });
            }
            createBtn(acts, "💎 マナゾーンに置く", () => {
                moveCard(c.uid, zone, 'mana');
            });
            
            document.getElementById('effect-modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function createBtn(cont, txt, cb) { let b = document.createElement('button'); b.innerText = txt; b.onclick = () => { cb(); closeModal(); }; cont.appendChild(b); }
        function closeModal() { 
            document.getElementById('effect-modal').style.display = 'none'; 
            document.getElementById('action-modal').style.display = 'none'; 
            document.getElementById('overlay').style.display = 'none'; 
        }

        // --- 🔮 カード効果の自動処理エンジン 🔮 ---
        function resolveCardEffect(card, fromZone) {
            setTimeout(() => {
                switch (card.id) {
                    case "ttt":
                    case "love":
                        // 3ドロー効果
                        alert(`${card.name} の効果で3枚ドローします！`);
                        drawCard(); drawCard(); drawCard();
                        break;
                    
                    case "lyrmis":
                        // 追加ターン
                        state.extraTurns++;
                        alert(`${card.name} 発動！追加ターンを1回獲得しました。`);
                        render();
                        break;

                    case "coldflame":
                    case "finger":
                    case "roaring":
                        // 手札を1枚捨てて2枚引く処理
                        if (state.hand.length === 0) {
                            alert("手札がないため、捨てる処理をスキップして2枚ドローします！");
                            drawCard(); drawCard();
                        } else {
                            openHandSelectModal("捨てるカードを1枚選んでください（その後2枚引きます）", (selectedUid) => {
                                let idx = state.hand.findIndex(x => x.uid === selectedUid);
                                if (idx !== -1) {
                                    state.graveyard.push(state.hand.splice(idx, 1)[0]);
                                    alert("1枚破棄しました。2枚ドローします。");
                                    drawCard(); drawCard();
                                    render();
                                }
                            });
                        }
                        break;

                    case "gate":
                        // ロスト・ウォーターゲイト：山札からサーチしてトップに置く
                        if (state.deck.length === 0) {
                            alert("山札がありません！");
                        } else {
                            openDeckSelectModal("山札から1枚選び、山札の一番上に置きます", (selectedUid) => {
                                let idx = state.deck.findIndex(x => x.uid === selectedUid);
                                if (idx !== -1) {
                                    let chosen = state.deck.splice(idx, 1)[0];
                                    state.deck.push(chosen); // 配列の末尾＝山札の一番上
                                    alert(`${chosen.name} を山札の一番上に固定しました！`);
                                    render();
                                }
                            });
                        }
                        break;

                    case "concerto":
                        // セイレーン・コンチェルト：マナ回収＆手札からマナ置き
                        if (state.mana.length === 0) {
                            alert("マナゾーンにカードがないため、手札から1枚マナに置く処理のみ行います。");
                            if (state.hand.length > 0) {
                                openHandSelectModal("マナに置くカードを選んでください", (selectedUid) => {
                                    let idx = state.hand.findIndex(x => x.uid === selectedUid);
                                    if(idx !== -1) {
                                        let c = state.hand.splice(idx, 1)[0];
                                        state.mana.push(c);
                                        render();
                                    }
                                });
                            }
                        } else {
                            openManaSelectModal("手札に戻すマナを1枚選んでください", (manaUid) => {
                                let mIdx = state.mana.findIndex(x => x.uid === manaUid);
                                if (mIdx !== -1) {
                                    let recovered = state.mana.splice(mIdx, 1)[0];
                                    recovered.tapped = false;
                                    state.hand.push(recovered);
                                    render();

                                    setTimeout(() => {
                                        openHandSelectModal("手札から新しくマナに置くカードを1枚選んでください", (handUid) => {
                                            let hIdx = state.hand.findIndex(x => x.uid === handUid);
                                            if (hIdx !== -1) {
                                                let toMana = state.hand.splice(hIdx, 1)[0];
                                                if (toMana.multi) toMana.tapped = true;
                                                state.mana.push(toMana);
                                                render();
                                            }
                                        });
                                    }, 300);
                                }
                            });
                        }
                        break;

                    case "maniacs":
                        // バッドドッグ・マニアクス：自分のクリーチャー1体自壊＆3枚墓地肥やし
                        alert("バッドドッグ・マニアクス発動！山札の上から3枚を墓地に置きます。");
                        for (let i = 0; i < 3; i++) {
                            if (state.deck.length > 0) state.graveyard.push(state.deck.pop());
                        }
                        if (state.battle.length > 0) {
                            setTimeout(() => {
                                openBattleSelectModal("破壊（墓地送り）する自分のクリーチャーを選択してください", (bUid) => {
                                    let bIdx = state.battle.findIndex(x => x.uid === bUid);
                                    if(bIdx !== -1) {
                                        state.graveyard.push(state.battle.splice(bIdx, 1)[0]);
                                        render();
                                    }
                                });
                            }, 300);
                        }
                        render();
                        break;

                    case "kirimomi":
                        alert("キリモミ・ヤマアラシ発動！このターン次に出すクリーチャーにSAを付与します。");
                        break;

                    default:
                        // 特殊効果がない呪文は唱えた通知のみ
                        break;
                }
            }, 200);
        }

        // --- 選択用特殊UIモーダル群 ---
        function openHandSelectModal(title, callback) {
            setupActionGrid(title, state.hand, callback);
        }
        function openManaSelectModal(title, callback) {
            setupActionGrid(title, state.mana, callback);
        }
        function openBattleSelectModal(title, callback) {
            setupActionGrid(title, state.battle, callback);
        }
        function openDeckSelectModal(title, callback) {
            // 山札は中身がわかるようにソート等せずそのまま表示
            setupActionGrid(title, [...state.deck].reverse(), callback); // トップに近い方から見せる
        }

        function setupActionGrid(title, cardArray, callback) {
            document.getElementById('action-modal-title').innerText = title;
            const grid = document.getElementById('action-modal-grid');
            grid.innerHTML = '';
            
            cardArray.forEach(c => {
                let div = document.createElement('div');
                div.className = 'select-item';
                div.innerHTML = `<img src="${c.img}" onerror="if(this.src.endsWith('.jpg'))this.src=this.src.replace('.jpg','.JPG');">`;
                div.onclick = () => {
                    callback(c.uid);
                    closeModal();
                };
                grid.appendChild(div);
            });
            document.getElementById('action-modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function executeGospel() { 
            setTimeout(() => { 
                if(confirm("ゴスペル能力：墓地の呪文をすべて手札に回収しますか？")){ 
                    let spells = state.graveyard.filter(x => x.isSpell); 
                    state.graveyard = state.graveyard.filter(x => !x.isSpell); 
                    state.hand.push(...spells); render(); 
                } 
            }, 300); 
        }

        function render() {
            ['shield','battle','mana','graveyard','hand'].forEach(z => {
                const el = document.getElementById(`list-${z}`); el.innerHTML = '';
                document.getElementById(`count-${z}`).innerText = state[z].length;
                state[z].forEach(c => {
                    let div = document.createElement('div'); div.className = `card ${c.facedown?'facedown':''} ${c.tapped?'tapped':''}`;
                    div.innerHTML = `<img class="card-img" src="${c.img}" onerror="if(this.src.endsWith('.jpg'))this.src=this.src.replace('.jpg','.JPG');">`;
                    
                    setupDragAndDrop(div, c.uid, z);
                    el.appendChild(div);
                });
            });
            document.getElementById('count-deck').innerText = state.deck.length;
            document.getElementById('spell-count').innerText = state.graveyard.filter(x => x.isSpell).length;
            document.getElementById('game-status').innerText = `ターン ${state.turn} ｜ マナセット：${state.hasChargedMana?'完了':'未完了'} ｜ 追加ターン：${state.extraTurns}`;
        }

        initGame();
    </script>
</body>
</html>
